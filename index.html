<!DOCTYPE html>
<html lang="ja">

    <style>
        body {
            font-family: 'Press+Start+2P', cursive;
            touch-action: manipulation;
        }
        .sub-marker {
        display: none;
        background: #98FB98;
        color: block;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        margin-top: 2px;
    }
        .nes-container {
            border: 4px solid black;
            border-radius: 8px;
            box-shadow: 0 6px 0 black;
        }
        .hp-bar-container {
            background-color: #e5e7eb;
            border: 2px solid #1f2937;
            border-radius: 8px;
            overflow: hidden;
            height: 20px;
        }
        .hp-bar {
            height: 100%;
            transition: width 1.1s ease-in-out; /* HPの減少速度を調整 */
            background-color: #22c55e;
        }
        .hp-bar.low {
            background-color: #facc15;
        }
        .hp-bar.critical {
            background-color: #ef4444;
        }
        .sprite-shake {
            animation: shake 0.5s;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); } 10% { transform: translate(-1px, -2px) rotate(-1deg); } 20% { transform: translate(-3px, 0px) rotate(1deg); } 30% { transform: translate(3px, 2px) rotate(0deg); } 40% { transform: translate(1px, -1px) rotate(1deg); } 50% { transform: translate(-1px, 2px) rotate(-1deg); } 60% { transform: translate(-3px, 1px) rotate(0deg); } 70% { transform: translate(3px, 1px) rotate(-1deg); } 80% { transform: translate(-1px, -1px) rotate(1deg); } 90% { transform: translate(1px, 2px) rotate(0deg); } 100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .pokemon-card, .item-card, .difficulty-card {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        .pokemon-card:hover, .item-card:hover, .difficulty-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 8px black;
        }
        .sprite-faint {
            transition: opacity 1s ease-out, transform 1s ease-out;
            opacity: 0;
            transform: translateY(50px);
        }
        #screen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.5s ease-in;
            z-index: 20;
        }
        #screen-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .status-badge {
            font-size: 0.6rem;
            padding: 2px 4px;
            border-radius: 4px;
            color: white;
            margin-left: 4px;
        }
        body {
    background-color: black !important;
      }
    </style>
</head>

// ===== 威力計算 =====
function getZPower(basePower) {
  if (basePower <= 55) return 100;
  if (basePower <= 60) return 120;
  if (basePower <= 70) return 140;  
  if (basePower <= 80) return 160;
  if (basePower <= 90) return 175;
  if (basePower <= 100) return 180;
  if (basePower <= 110) return 185;
  if (basePower <= 120) return 190;
  if (basePower <= 130) return 195;
  return 200;
}

// ===== 初期化時に呼ぶ（重要）=====
function initZData(pokemon) {
  const firstMove = pokemon.moves[0];

  if (!firstMove) {
    pokemon.zMoveBase = null;
    return;
  }

  if (firstMove.category !== "physical" && firstMove.category !== "special") {
    pokemon.zMoveBase = null;
    return;
  }

  pokemon.zMoveBase = {
    type: firstMove.type,
    power: firstMove.power
  };
}

// ===== 使用可能判定 =====
function canUseZMove(pokemon) {
  if (pokemon.usedZMove) return false;
  if (pokemon.item?.name !== "Zクリスタル") return false;
  if (!pokemon.zMoveBase) return false;
  return true;
}

function canMegaEvolve(pokemon){
    if (pokemon.megaEvolved) return false;

    const mega = MEGA_DATA[pokemon.name];
    if (!mega) return false;

    return pokemon.item?.name === "メガストーン";
}

// ===== Zワザ生成 =====
function createZMove(pokemon) {
  if (pokemon.name === "ミミッキュ") {
    return {
        name: "ぽかぼかフレンドタイム",
        type: "フェアリー",
        power: 190,
        accuracy: 999,
        category: "physical",
        pp: 1,
        currentPp: 1,
        critPriority:1,
        isZMove: true

    function createPokemonInstance(pokemonData) {
        const instance = calculateStats(pokemonData);
        instance.currentHp = instance.maxHp;
        instance.statModifiers = { attack: 1 };
        instance.statStages = { attack: 0, defense: 0, spAttack: 0, spDefense: 0, speed: 0 };
        instance.status = null;
        instance.statusTurns = 0;
        auroraVeil: 0;
        instance.volatileStatus = {
    seeded: false,
    seedSource: null
};
        instance.item = null;
        instance.isFlinched = false;
        
        instance.hasSubstitute = false;
        instance.substituteHp = 0;
        instance.isShiny = Math.random() < 0.00025;
        instance.isRampaging = false;
        instance.rampageTurns = 0;
        instance.isConfused = false;
        instance.confusionTurns = 0;
        instance.toxicCounter = 0;
        instance.lastDamageTaken = 0;
        instance.lastDamageCategory = null; // 'physical' or 'special'
        instance.moves = JSON.parse(JSON.stringify(pokemonData.moves)); // Deep copy moves
        instance.moves.forEach(m => m.currentPp = m.pp);
        return instance;
    }

    function calculateStats(basePokemon) {
        const level = 50;
        const pokemon = { ...basePokemon };
        
        const ivs = { hp: 31, attack: 31, defense: 31, spAttack: 31, spDefense: 31, speed: 31 };
        if (basePokemon.baseSpAttack > basePokemon.baseAttack) { ivs.attack = 0; }

        const defaultEVs = {
            hp: 4,
            atk: basePokemon.baseAttack >= basePokemon.baseSpAttack ? 252 : 0,
            def: 0,
            spa: basePokemon.baseSpAttack > basePokemon.baseAttack ? 252 : 0,
            spd: 0,
            spe: 252
        };
        const evs = { ...defaultEVs, ...basePokemon.evs };
        pokemon.maxHp = Math.floor(((2 * basePokemon.baseHp + ivs.hp + Math.floor(evs.hp / 4)) * level) / 100) + level + 10;
        const calcOtherStat = (base, iv, ev) => Math.floor((((2 * base + iv + Math.floor(ev / 4)) * level) / 100) + 5);
        pokemon.attack = calcOtherStat(basePokemon.baseAttack, ivs.attack, evs.atk);
        pokemon.defense = calcOtherStat(basePokemon.baseDefense, ivs.defense, evs.def);
        pokemon.spAttack = calcOtherStat(basePokemon.baseSpAttack, ivs.spAttack, evs.spa);
        pokemon.spDefense = calcOtherStat(basePokemon.baseSpDefense, ivs.spDefense, evs.spd);
        pokemon.speed = calcOtherStat(basePokemon.baseSpeed, ivs.speed, evs.spe);
       const nature = natures[pokemon.nature];

if (nature) {
    if (nature.up) {
        pokemon[nature.up] = Math.floor(pokemon[nature.up] * 1.1);
    }
    if (nature.down) {
        pokemon[nature.down] = Math.floor(pokemon[nature.down] * 0.9);
    }
}
        return pokemon;
    }

    if (s.attack < 0) text += `Atk${s.attack} `;

    if (s.spAttack > 0) text += `SpA+${s.spAttack} `;
    if (s.spAttack < 0) text += `SpA${s.spAttack} `;

    if (s.defense > 0) text += `Def+${s.defense} `;
    if (s.defense < 0) text += `Def${s.defense} `;

    if (s.spDefense > 0) text += `SpD+${s.spDefense} `;
    if (s.spDefense < 0) text += `SpD${s.spDefense} `;

    if (s.speed > 0) text += `Spe+${s.speed} `;
    if (s.speed < 0) text += `Spe${s.speed} `;

    element.textContent = text.trim();

    function has4xWeakness(types) {
        for (const attackingType in typeChart) {
            let totalMultiplier = 1;
            types.forEach(defendingType => {
                totalMultiplier *= typeChart[attackingType]?.[defendingType] ?? 1;
            });
            if (totalMultiplier >= 4) {
                return true;
            }
        }
        return false;
    }

    async function applyDamage(attacker, defender, damage, move, defenderUI) {

    // まもる
    if (defender.isProtected) {

    // ふかしのこぶしなら貫通
    if (attacker.ability !== "ふかしのこぶし") {

        if (
            defender.isKingShield &&
            move.isContact
        ) {
            attacker.statStages.attack = Math.max(
                -6,
                attacker.statStages.attack - 2
            );

            updateStatDisplay(
                playerPokemon,
                document.getElementById('player-stat-display')
            );
            updateStatDisplay(
                opponentPokemon,
                document.getElementById('opponent-stat-display')
            );

            await showMessage(
                `${attacker.name} の こうげきが がくっと さがった！`
            );
        }

        await showMessage(
            `${defender.name} は まもっている！`
        );

        return { hit: false };
    }
}

    // みがわり
    if (defender.hasSubstitute && !move.isSound) {
        defender.substituteHp -= damage;
        await showMessage(`${defender.name} の みがわりが こうげきを うけた！`);

        if (defender.substituteHp <= 0) {
            defender.hasSubstitute = false;
            defender.substituteHp = 0;
            updateSubstituteMarkers();
            await showMessage(`${defender.name} の みがわりは こわれた！`);
        }

        return { hit: true };
    }

    // 本体ダメージ
    defender.currentHp = Math.max(0, defender.currentHp - damage);
    defender.lastDamageTaken = damage;
    defender.lastDamageCategory = move.category;

    updateHpBars();

    // ⭐ ここでまず defender の瀕死チェック
    if (defender.currentHp <= 0) {
        const isPlayerDefender = defender === playerPokemon;
        await checkFainted(defender, isPlayerDefender);
        return { hit: true, fainted: true };
    }

    // ⭐ 接触ダメージ
    if (move.isContact) {
        if (defender.item?.name === 'ゴツゴツメット') {
            const recoil = Math.floor(attacker.maxHp / 6);
            attacker.currentHp = Math.max(0, attacker.currentHp - recoil);
            await showMessage(`${attacker.name} は ゴツゴツメットで ダメージをうけた！`);
        }

        if (defender.ability === 'さめはだ' || defender.ability === 'てつのとげ') {
            const recoil = Math.floor(attacker.maxHp / 6);
            attacker.currentHp = Math.max(0, attacker.currentHp - recoil);
            await showMessage(`${attacker.name} は 相手の特性で ダメージをうけた！`);
        }

        updateHpBars();

        // ⭐ ここが今回の本質
        if (attacker.currentHp <= 0) {
            const isPlayerAttacker = attacker === playerPokemon;
            await checkFainted(attacker, isPlayerAttacker);
            return { hit: true, fainted: true };
        }
    }

    return { hit: true, fainted: false };
}

            pokemon.currentHp = Math.max(0, pokemon.currentHp - damage);
            await showMessage(message);
            updateHpBars();
            await new Promise(resolve => setTimeout(resolve, 1200));

            return await checkFainted(pokemon, isPlayer);
    }

    return false;
}

    async function checkFainted(pokemon, isPlayer) {
            if (pokemon.currentHp <= 0) {
                const faintedSprite = isPlayer ? player.sprite : opponent.sprite;
                faintedSprite.classList.add('sprite-faint');
                await new Promise(resolve => setTimeout(resolve, 1000));
                await showMessage(`${isPlayer ? "" : "あいて の "}${pokemon.name} は たおれた${isPlayer ? "..." : "！"}`);
                
                if (isPlayer) {
                    screenOverlay.classList.add('active');
                    await new Promise(resolve => setTimeout(resolve, 1500));
                }
                endGame(!isPlayer);
                return true;
            }
        return false;
    }


    function getStatModifier(stage) {
        if (stage >= 0) return (2 + stage) / 2;
        return 2 / (2 - stage);
    }

    function getPokemonSpeed(pokemon) {
        let speed = pokemon.speed * getStatModifier(pokemon.statStages.speed);
        if (pokemon.status === 'paralyze') speed *= 0.5;
        if (pokemon.item && pokemon.item.name === 'しゅんそくスカーフ') {
            speed *= 1.25;
        }
        if (pokemon.ability && pokemon.ability.name === 'ききかいひ') {
            speed *= 1.25;
        }
        return speed;
    }

async function applyGeigekiScopeOnEnter(pokemon) {
    const up = [];
    const down = [];

    if (pokemon.statStages.speed < 6) {
        pokemon.statStages.speed++;
        up.push('素早さ');
    }

    if (up.length === 0 && down.length === 0) return;

    let message = `${pokemon.name} の げいげきスコープ！\n`;

    if (up.length && down.length) {
        message += `${up.join('・')}が上がって、${down.join('・')}が下がった！`;
    } else if (up.length) {
        message += `${up.join('・')}が上がった！`;
    } else {
        message += `${down.join('・')}が下がった！`;
    }

    await showMessage(message);
    updateStatDisplay(playerPokemon, document.getElementById('player-stat-display'));
    updateStatDisplay(opponentPokemon, document.getElementById('opponent-stat-display'));
}
    
    async function checkAndUseItem(pokemon) {
        if (pokemon.item && pokemon.item.name === "オボンの実" && !pokemon.item.used && pokemon.currentHp > 0 && pokemon.currentHp <= pokemon.maxHp / 3) {
            pokemon.item.used = true;
            const healAmount = Math.floor(pokemon.maxHp / 3);
            pokemon.currentHp = Math.min(pokemon.maxHp, pokemon.currentHp + healAmount);
            await showMessage(`${pokemon.name} は オボンの実で かいふくした！`);
            updateHpBars();
            return true;
        }
        return false;
    }

    function calculateTypeEffectiveness(moveType, defenderTypes) {
        let totalMultiplier = 1;
        defenderTypes.forEach(defendingType => {
            totalMultiplier *= typeChart[moveType]?.[defendingType] ?? 1;
        });
        return totalMultiplier;
    }
    
    function calculateDamage(move, attacker, defender) {
      const attackType = move.dynamicAppliedType ? move.dynamicAppliedType : move.type;
        let effectivenessMessage = '';
        const level = 50;
        const critStage = move.critPriority || 0;

const critRates = [
    1 / 24, // 通常
    1 / 8,  // +1
    1 / 2,  // +2
    1       // +3以上 確定
];

let isCrit =
    Math.random() <
    critRates[Math.min(critStage, 3)];
    const atkStageFix = (stage) =>
    isCrit && stage < 0 ? 0 : stage;

const defStageFix = (stage) =>
    isCrit && stage > 0 ? 0 : stage;
    if (
    defender.ability === "ばけのかわ" &&
    !defender.disguiseBroken
) {
    defender.disguiseBroken = true;

    if (defender.name === "ミミッキュ") {
        let sprite;

        if (defender === playerPokemon) {
            sprite = player.sprite;
            sprite.src =
                "https://play.pokemonshowdown.com/sprites/ani-back/mimikyu-busted.gif";
        } else {
            sprite = opponent.sprite;
            sprite.src =
                "https://play.pokemonshowdown.com/sprites/ani/mimikyu-busted.gif";
        }

    }

    return {
        damage: 0,
        effectivenessMessage: `${defender.name} の ばけのかわが はがれた！`
    };
}

        if (defender.ability === 'ふゆう' && move.type === 'じめん') return { damage: 0, effectivenessMessage: `${defender.name} の ふゆう で こうかがない！` };
        if (defender.ability === 'ちくでん' && move.type === 'でんき') return { damage: 0, healing: Math.floor(attacker.maxHp / 4) };

        let attackStat, defenseStat;
        if (move.category === 'physical') {

    if (move.name === 'ボディプレス') {
        attackStat =
            attacker.defense *
            getStatModifier(atkStageFix(attacker.statStages.defense));
    } else {
        attackStat =
            attacker.attack *
            getStatModifier(atkStageFix(attacker.statStages.attack));
    }

    defenseStat =
        defender.defense *
        getStatModifier(defStageFix(defender.statStages.defense));

    // ゆき補正
    if (
        weather.type === "snow" &&
        defender.types.includes("こおり")
    ) {
        defenseStat *= 1.5;
    }

    if (defender.item?.name === "たいきゅうチョッキ") {
        defenseStat *= 1.25;
    }
}
else if (move.category === 'special') {

    attackStat =
        attacker.spAttack *
        getStatModifier(atkStageFix(attacker.statStages.spAttack));

    defenseStat =
        defender.spDefense *
        getStatModifier(defStageFix(defender.statStages.spDefense));

    if (defender.item?.name === "たいきゅうチョッキ") {
        defenseStat *= 1.25;
    }
}

        let movePower = move.power;
        if ((attacker.ability === 'もうか' && attacker.currentHp / attacker.maxHp <= 1/3 && move.type === 'ほのお') || (attacker.ability === 'げきりゅう' && attacker.currentHp / attacker.maxHp <= 1/3 && move.type === 'みず') || (attacker.ability === 'しんりょく' && attacker.currentHp / attacker.maxHp <= 1/3 && move.type === 'くさ') || (attacker.ability === 'むしのしらせ' && attacker.currentHp / attacker.maxHp <= 1/3 && move.type === 'むし')) movePower *= 1.5;
        if (attacker.ability === 'テクニシャン' && move.power <= 60) movePower *= 1.5;
        if (attacker.ability === 'てつのこぶし' && move.isPunch) movePower *= 1.2;
        if (attacker.item && attacker.item.name === 'ちからのはちまき' && move.category === 'physical') movePower *= 1.25;
        if (attacker.item && attacker.item.name === 'ものしりメガネ' && move.category === 'special') movePower *= 1.25;
        if (attacker.item && attacker.item.name === 'なにも持たせない' && move.power <= 2000) movePower *= 1;
        if (attacker.item && attacker.item.name === 'マジックハンド' && move.power <= 40) movePower *= 1.5;
        if (attacker.ability === 'ちからずく' && move.category && move.power <= 2000) movePower *= 1.3;
        if (attacker.ability === 'そうだいしょう' && move.category && move.power <= 2000) movePower *= 1.3;
        if (attacker.ability === 'きずなへんげ' && move.category && move.power <= 2000) movePower *= 1.5;
        if (attacker.ability === 'フェアリースキン' && move.category && move.power <= 2000) movePower *= 1.2;
        if (attacker.ability === 'かたいツメ' && move.category && move.power <= 2000) movePower *= 1.3;
        if (attacker.ability === 'はりきり' && move.category && move.power <= 2000) movePower *= 1.5;
        if (attacker.ability === 'ちからもち' && move.category && move.power <= 2000) movePower *= 2;
        if (attacker.ability === 'きれあじ' && move.category && move.power <= 2000) movePower *= 1.5;
        if (attacker.ability === 'ブレインフォース' && move.category && move.power <= 2000) movePower *= 1.25;
        if (attacker.ability === 'アナライズ' && move.category === 'special') movePower *= 1.3;
        if (attacker.ability === 'マルチタイプ' && move.power <= 70) movePower *= 1.5;
        if (attacker.status === 'burn' && move.category === 'physical' && move.name !== 'ボディプレス') { movePower *= 0.5; }
        if (weather.type === 'rain') {
    if (move.type === 'みず') movePower *= 1.5;
    if (move.type === 'ほのお') movePower *= 0.5;
};
if (field.type === 'psyco') {

    // エスパー技強化
    if (move.type === 'エスパー') {
        movePower *= 1.6;
    }

    // 先制技弱体化
    if (move.priority > 0) {
        movePower *= 0.0001;
    }
}

        let damage = Math.floor(Math.floor(Math.floor(2 * level / 5 + 2) * movePower * attackStat / defenseStat) / 50) + 2;

        if (attacker.types.includes(move.type)) {
            const stabMultiplier = attacker.ability === 'てきおうりょく' ? 2 : 1.5;
            damage = Math.floor(damage * stabMultiplier);
        }

        if (defender.ability === 'マルチスケイル' && defender.currentHp === defender.maxHp && !defender.hasSubstitute) damage *= 0.5;
        if (defender.ability === 'あついしぼう' && (move.type === 'ほのお' || move.type === 'こおり')) damage *= 0.5;
        
       const typeMultiplier = calculateTypeEffectiveness(attackType, defender.types);
       let actualTypeMultiplier = typeMultiplier;

if (
    attacker.ability === "きもったま" &&
    defender.types.includes("ゴースト") &&
    (
        attackType === "ノーマル" ||
        attackType === "かくとう"
    ) &&
    typeMultiplier === 0
){
    actualTypeMultiplier = 1;
}

        if(isCrit) {
             damage = Math.floor(damage * 1.5 );
             effectivenessMessage = 'きゅうしょにあたった！';
        }
        else if (typeMultiplier > 1) effectivenessMessage = "こうかは ばつぐんだ！";
        else if (typeMultiplier < 1 && typeMultiplier > 0) effectivenessMessage = "こうかは いまひとつの ようだ...";
        else if (typeMultiplier === 0) effectivenessMessage = "こうかが ない みたいだ...";

        damage = Math.floor(damage * actualTypeMultiplier);
        if (attacker.ability === 'ブレインフォース' && typeMultiplier > 1) {
            damage = Math.floor(damage * 1.25);
        }
        damage = Math.floor(damage * (Math.random() * (1.0 - 0.85) + 0.85));

        if (defender.auroraVeil > 0) {
    damage = Math.floor(damage * 0.5);
}
        
        let healing = 0;
if (move.name === "ギガドレイン")
    healing = Math.floor(damage / 2);

const finalDamage =
    Math.max(typeMultiplier > 0 ? 1 : 0, damage);

return {
    damage: finalDamage,
    effectivenessMessage,
    healing
};
    }
    
    function updateStatusMarkers() {
        [player, opponent].forEach(p => {
            const pokemon = p === player ? playerPokemon : opponentPokemon;
            if (pokemon && pokemon.status) {
                p.statusEl.style.display = 'inline-block';
                switch(pokemon.status) {
                    case 'burn': p.statusEl.textContent = 'BRN'; p.statusEl.style.backgroundColor = '#ef4444'; break;
                    case 'freeze': p.statusEl.textContent = 'FRZ'; p.statusEl.style.backgroundColor = '#38bdf8'; break;
                    case 'paralyze': p.statusEl.textContent = 'PAR'; p.statusEl.style.backgroundColor = '#facc15'; break;
                    case 'poison': p.statusEl.textContent = 'PSN'; p.statusEl.style.backgroundColor = '#a855f7'; break;
                    case 'toxic': p.statusEl.textContent = 'TOX'; p.statusEl.style.backgroundColor = '#710297'; break;
                    case 'sleep': p.statusEl.textContent = 'SLP'; p.statusEl.style.backgroundColor = '#71717a'; break;
                }
            } else if (p.statusEl) {
                p.statusEl.style.display = 'none';
            }
        });
    }

    function updateHpBars() {
        if(playerPokemon) {
            const playerHpPercent = (playerPokemon.currentHp / playerPokemon.maxHp) * 100;
            player.hpBar.style.width = `${playerHpPercent}%`;
            player.currentHpEl.textContent = Math.max(0, Math.round(playerPokemon.currentHp));
            updateHpBarColor(player.hpBar, playerHpPercent);
        }
        if(opponentPokemon){
            const opponentHpPercent = (opponentPokemon.currentHp / opponentPokemon.maxHp) * 100;
            opponent.hpBar.style.width = `${opponentHpPercent}%`;
            updateHpBarColor(opponent.hpBar, opponentHpPercent);
        }
        const opponentHpPercent =
    (opponentPokemon.currentHp / opponentPokemon.maxHp) * 100;

document.getElementById("opponent-current-hp").textContent =
    ` ${Math.round(opponentHpPercent)}% `;

document.getElementById("opponent-max-hp").textContent = "";
    updateSubstituteMarkers();
    }
    
    function updateHpBarColor(bar, percent) {
        bar.classList.remove('low', 'critical');
        if (percent < 20) bar.classList.add('critical');
        else if (percent < 50) bar.classList.add('low');
    }
     function updateSubstituteMarkers() {
    const playerSub = document.getElementById('player-substitute');
    const opponentSub = document.getElementById('opponent-substitute');

    if (playerPokemon.hasSubstitute) {
        playerSub.style.display = 'inline-block';
    } else {
        playerSub.style.display = 'none';
    }

    if (opponentPokemon.hasSubstitute) {
        opponentSub.style.display = 'inline-block';
    } else {
        opponentSub.style.display = 'none';
    }
}
    

    function endGame(playerWon) {
        disableMoves();
        menu.style.display = 'none';
        
        if (playerWon) {
            winScreen.style.display = 'flex';
            winText.textContent = "しょうぶ に かった！";
        } else {
            gameOverScreen.style.display = 'flex';
            gameOverText.textContent = "めのまえが まっくら になった...";
        }
    }

    function showMessage(text, duration = 1500) {
    return new Promise(resolve => {
        messageText.style.display = '';
        messageText.textContent = text;
        setTimeout(resolve, duration);
    });
}
    
    function disableMoves() { movesContainer.querySelectorAll('button').forEach(b => b.disabled = true); }
    function enableMoves() { 
        if(playerPokemon && playerPokemon.isRampaging) return;
        movesContainer.querySelectorAll('button').forEach(b => b.disabled = false); 
    }

    function resetGame() {
    gameId++;

    messageText.textContent = '';
    messageText.style.display = '';

    battleScreen.style.display = '';
    menu.style.display = '';

    gameOverScreen.style.display = '';
    winScreen.style.display = '';

    screenOverlay.classList.remove('active');

    enableMoves();

    playerPokemon = undefined;
    opponentPokemon = undefined;

    selectedPlayerKey = undefined;
    selectedPlayerItemName = undefined;
    selectedOpponentKey = undefined;
    selectedOpponentItemName = undefined;
    playerPokemon = undefined;
opponentPokemon = undefined;
isBattleInProgress = false;

    difficulty = undefined;
    currentTurn = 1;

    weather = { type: 'none', turns: 0 };
    field = { type: 'none', turns: 0 };

    showPlayerSelection();
    showMessage('どうする？', 500);
}
    async function handleAbilityEffectsOnEntry() {
    if(playerPokemon.ability === "すなおこし" || opponentPokemon.ability === "すなおこし") {
        weather.type = 'sandstorm';
        weather.turns = 5;
        await showMessage('すなあらしが ふきはじめた！');
    }

    if(playerPokemon.ability === "ゆきふらし" || opponentPokemon.ability === "ゆきふらし") {
        weather.type = 'snow';
        weather.turns = 5;
        await showMessage('ゆきが ふりはじめた！');
    }

    if(playerPokemon.ability === "あめふらし" || opponentPokemon.ability === "あめふらし") {
        weather.type = 'rain';
        weather.turns = 5;
        await showMessage('あめが ふりはじめた！');
    }

    if(playerPokemon.ability === "サイコメイカー" || opponentPokemon.ability === "サイコメイカー") {
        field.type = 'psyco';
        field.turns = 5;
        await showMessage('あしもとが ふしぎなかんじに なった！');
    }

    updateWeatherIndicator();
    updateFieldIndicator();

}

    function updateWeatherIndicator() {
    if (weather.type === 'sandstorm') {
        weatherIndicator.textContent = 'てんこう: すなあらし';
        weatherIndicator.style.display = 'block';
    } else if (weather.type === 'rain') {
        weatherIndicator.textContent = 'てんこう: あめ';
        weatherIndicator.style.display = 'block';
    } else if (weather.type === 'snow') {
        weatherIndicator.textContent = 'てんこう: ゆき';
        weatherIndicator.style.display = 'block'; 
    } else {    
        weatherIndicator.style.display = 'none';
    }
}
function updateFieldIndicator() {
  if (field.type === 'psyco') {
        fieldIndicator.textContent = 'フィールド: サイコフィールド';
        fieldIndicator.style.display = 'block';
  } else {    
        fieldIndicator.style.display = 'none';
    }
}


    function getPokemonCardImage(pokemonData, isPlayer = true, isShiny = false) {
    if (pokemonData.images) {
        return isPlayer ? (isShiny ? pokemonData.images.shinyBack : pokemonData.images.back)
                        : (isShiny ? pokemonData.images.shinyFront : pokemonData.images.front);
    }
    return `${POKE_API_BASE_URL}${pokemonData.id}.gif`; // 通常ポケモン
}

    restartButton.onclick = resetGame;
    winRestartButton.onclick = resetGame;

    showPlayerSelection();
});
</script>
